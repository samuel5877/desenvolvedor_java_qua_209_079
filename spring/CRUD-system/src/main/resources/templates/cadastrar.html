<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
     <link href="css/cadastrar.css" rel="stylesheet" type="text/css" media="all">
</head>
<body>
    <form method="POST">
    <h1>Cadastro de usuário</h1>
    <label for="nome">Informe o nome:</label>
    <input type="text" id="nome" placeholder="Informe o seu Nome" name="nome"><br>

    <label for="cpf">Informe o CPF:</label>
    <input type="text" id="cpf" placeholder="Informe o seu CPF" name="cpf"><br>

    <label for="email">Informe o E-mail:</label>
    <input type="email" id="email" placeholder="Informe o seu E-mail" name="email"><br>

    <button type="submit">Enviar</button>

    </form>
</body>
</html>
